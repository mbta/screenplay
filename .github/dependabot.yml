version: 2
updates:
  - package-ecosystem: mix
    directory: "/"
    schedule:
      interval: weekly
      time: "10:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-minor"]
    groups:
      mix-patches-and-minor:
        update-types:
          - "patch"
          - "minor"
  - package-ecosystem: npm
    directory: "/assets"
    schedule:
      interval: weekly
      time: "10:00"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-minor"]
    groups:
      npm-patches-and-minor:
        update-types:
          - "patch"
          - "minor"
      eslint:
        patterns:
          - "eslint*"
          - "@typescript-eslint*"
      react:
        patterns:
          - "react*"
          - "@types/react*"
      testing-tools:
        patterns:
          - "ts-jest"
          - "@types/jest"
          - "jest*"
          - "@testing-library*"
      moment:
        patterns:
          - "moment*"
      sentry:
        patterns:
          - "@sentry/*"
